name: Docs Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  docs-bot:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@docs')
    
    permissions:
      pull-requests: write
      issues: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Create bot response
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            const commentBody = comment.body;
            
            // Extract text after @docs
            const docsContent = commentBody.substring(commentBody.indexOf('@docs') + 5).trim();
            
            // Prepare response
            const response = `📝 Docs Bot Response:\n\n${docsContent}`;
            
            // Post response
            if (context.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            } else {
              await github.rest.pulls.createReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: response,
                commit_id: context.payload.comment.commit_id,
                path: context.payload.comment.path,
                line: context.payload.comment.line
              });
            }
