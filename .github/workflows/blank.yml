name: Docs Bot

on:
  issue_comment:
    types: [created]

jobs:
  docs-bot:
    runs-on: ubuntu-latest
    # Only run if the comment contains @docs and is on a PR
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '@docs') }}
    
    permissions:
      pull-requests: write
      issues: write
      
    steps:
      - name: Create bot response
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = context.payload.comment.body;
            const docsContent = commentBody.substring(commentBody.indexOf('@docs') + 5).trim();
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `📝 Docs Bot Response:\n\n${docsContent}`
            });
