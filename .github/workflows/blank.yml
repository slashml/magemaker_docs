name: pull request comment
on:
  issue_comment:                                     
    types: [created, edited, deleted]
jobs:
  docs-job:
    if: contains(github.event.comment.html_url, '/pull/')  # check if comments come from pull request
    runs-on: ubuntu-latest  # changed from re-centos7 to ubuntu-latest for wider compatibility
    steps:
    - name: Echo docs command
      if: contains(github.event.comment.body, '@docs')
      run: |
        echo "Comment received:"
        echo "${{ github.event.comment.body }}"
        
    - name: Reply to comment
      if: contains(github.event.comment.body, '@docs')
      uses: actions/github-script@v6
      with:
        script: |
          const comment = context.payload.comment.body;
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `Echo: ${comment}`
          });