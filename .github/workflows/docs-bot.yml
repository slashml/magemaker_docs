name: Docs Bot

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [created]

jobs:
  docs-bot:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_target' && contains(github.event.comment.body, '@docs'))
    
    permissions:
      pull-requests: write
      issues: write
      
    steps:
      - name: Debug event
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event type: ${{ github.event.action }}"
          echo "Has PR: ${{ github.event.issue.pull_request != null }}"
          
      - name: Create bot response
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Event context:', context);
            
            const commentBody = context.payload.comment?.body;
            if (!commentBody?.includes('@docs')) {
              console.log('No @docs mention found');
              return;
            }
            
            const docsContent = commentBody.substring(commentBody.indexOf('@docs') + 5).trim();
            const response = `📝 Docs Bot Response:\n\n${docsContent}`;
            
            if (context.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            } else {
              await github.rest.pulls.createReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: response,
                commit_id: context.payload.comment.commit_id,
                path: context.payload.comment.path,
                line: context.payload.comment.line
              });
            }
