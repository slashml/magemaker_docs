name: Docs Bot

on:
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [review_requested]
  issue_comment:
    types: [created]

jobs:
  docs-bot:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@docs') || contains(github.event.review.body, '@docs')
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
        
      - name: Process comment
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let commentBody;
            
            if (eventName === 'issue_comment') {
              commentBody = context.payload.comment.body;
            } else if (eventName === 'pull_request_review') {
              commentBody = context.payload.review.body;
            } else if (eventName === 'pull_request_review_comment') {
              commentBody = context.payload.comment.body;
            }
            
            if (!commentBody || !commentBody.includes('@docs')) {
              return;
            }
            
            const docsContent = commentBody.substring(commentBody.indexOf('@docs') + 5).trim();
            const response = `📝 Docs Bot Response:\n\n${docsContent}`;
            
            // Handle different types of comments
            if (eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            } else if (eventName === 'pull_request_review') {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: response,
                event: 'COMMENT'
              });
            } else if (eventName === 'pull_request_review_comment') {
              await github.rest.pulls.createReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: response,
                commit_id: context.payload.comment.commit_id,
                path: context.payload.comment.path,
                line: context.payload.comment.line
              });
            }
