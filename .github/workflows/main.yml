# File: .github/workflows/version-bump.yml
name: Docsalot Bot Workflow

on:
  issue_comment:
    types: [created]

# Add explicit permissions
permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  process-bot-command:
    # Only run if it's a PR comment
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Check for bot mention and extract command
        id: check_command
        run: |
          COMMENT="${{ github.event.comment.body }}"
          echo "Received comment: $COMMENT"
          if [[ $COMMENT == *"@docsalot"* ]]; then
            echo "Bot was mentioned!"
            # Extract everything after @docsalot
            COMMAND=$(echo "$COMMENT" | sed 's/.*@docsalot[[:space:]]*//')
            echo "Command received: $COMMAND"
            echo "command=$COMMAND" >> $GITHUB_OUTPUT
            echo "triggered=true" >> $GITHUB_OUTPUT
          else
            echo "No bot mention found"
            echo "triggered=false" >> $GITHUB_OUTPUT
          fi

      - name: Echo Command
        if: steps.check_command.outputs.triggered == 'true'
        run: |
          echo "User command was:"
          echo "${{ steps.check_command.outputs.command }}"
          
      - name: Add Response Comment
        if: steps.check_command.outputs.triggered == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `I received your command: ${process.env.COMMAND}`
            });
        env:
          COMMAND: ${{ steps.check_command.outputs.command }}