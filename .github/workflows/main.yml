# File: .github/workflows/version-bump.yml
name: Docsalot Bot Workflow

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened]

# Add explicit permissions
permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  # Job for handling PR creation
  log-pr-url:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR URL Comment
        run: |
          PR_URL=https://magemaker-staging-a7933add265b4f9e.slashml.com
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          # Configure git with custom committer
          git config --global user.name "Docsalot Bot"
          git config --global user.email "docsalot[bot]@users.noreply.github.com"
          
          # Create comment using curl
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -d "{\"body\":\"📝 From @SirDocsALot the new docs are staged at ${PR_URL}\"}"

  process-bot-command:
    # Only run if it's a PR comment
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Check for bot mention and extract command
        id: check_command
        run: |
          COMMENT="${{ github.event.comment.body }}"
          echo "Received comment: $COMMENT"
          if [[ $COMMENT == *"@sirdocsalot"* ]]; then
            echo "Bot was mentioned!"
            COMMAND=$(echo "$COMMENT" | sed 's/.*@sirdocsalot[[:space:]]*//')
            echo "Command received: $COMMAND"
            # echo "command=$COMMAND" >> $GITHUB_OUTPUT
            echo "triggered=true" >> $GITHUB_OUTPUT
            
            # Check if comment contains mint.json
            if [[ $COMMENT == *"mint.json"* ]]; then
              echo "response_type=mint" >> $GITHUB_OUTPUT
            else
              echo "response_type=default" >> $GITHUB_OUTPUT
            fi
          else
            echo "No bot mention found"
            echo "triggered=false" >> $GITHUB_OUTPUT
          fi

      - name: Echo Command
        if: steps.check_command.outputs.triggered == 'true'
        run: |
          echo "User command was:"
          echo "${{ steps.check_command.outputs.command }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}  # This checks out the PR branch
          token: ${{ secrets.PAT }}
          persist-credentials: true
          fetch-depth: 0

      - name: Update Mint.json
        if: steps.check_command.outputs.triggered == 'true' && steps.check_command.outputs.response_type == 'mint'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # Copy the file
         # Debug: Print current branch
          echo "Current branch: $PR_BRANCH"
          git branch --show-current

          if [ -f ".github/workflows/mint.json" ]; then
            cp .github/workflows/mint.json ./mint.json
            
            # Configure git
            git config user.name "SirDocsAlot[bot]"
            git config user.email "SirDocsAlot[bot]@users.noreply.github.com"
            
            # Add and commit the changes
            git add mint.json
            git commit -m "docs: Update mint.json configuration as requested"
            git remote set-url origin "https://${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD
            echo "mint_updated=true" >> $GITHUB_OUTPUT
          else
            pwd
            ls -al
            echo "Error: mint.json not found in .github/workflows/"
            echo "mint_updated=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Add Response Comment - Mint.json
        if: steps.check_command.outputs.triggered == 'true' && steps.check_command.outputs.response_type == 'mint'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `From @SirDocsalot: Apologies, I have updated the mint.json file to include the newly created tutorial. I have also updated the tutorial to reflect the changes in the original PR.\n\nThe new docs are staged at: http://magemaker-staging-f63068d97cbe6cff.slashml.com`});

      - name: Add Response Comment - Default
        if: steps.check_command.outputs.triggered == 'true' && steps.check_command.outputs.response_type == 'default'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `From @SirDocsalot: I have pushed a new commit, which contains a tutorial about the newly added query command.\n\nThe new docs are staged at: http://magemaker-staging-da6406b810adbea4.slashml.com`});
