# File: .github/workflows/version-bump.yml
name: Docsalot Bot Workflow

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened]

# Add explicit permissions
permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  # Job for handling PR creation
  log-pr-url:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR URL Comment
        run: |
          PR_URL=https://magemaker-staging-a7933add265b4f9e.slashml.com
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          # Configure git with custom committer
          git config --global user.name "Docsalot Bot"
          git config --global user.email "docsalot[bot]@users.noreply.github.com"
          
          # Create comment using curl
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -d "{\"body\":\"📝 Pull Request URL: ${PR_URL}\"}"

  process-bot-command:
    # Only run if it's a PR comment
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Check for bot mention and extract command
        id: check_command
        run: |
          COMMENT="${{ github.event.comment.body }}"
          echo "Received comment: $COMMENT"
          if [[ $COMMENT == *"@docsalot"* ]]; then
            echo "Bot was mentioned!"
            # Extract everything after @docsalot
            COMMAND=$(echo "$COMMENT" | sed 's/.*@docsalot[[:space:]]*//')
            echo "Command received: $COMMAND"
            echo "command=$COMMAND" >> $GITHUB_OUTPUT
            echo "triggered=true" >> $GITHUB_OUTPUT
          else
            echo "No bot mention found"
            echo "triggered=false" >> $GITHUB_OUTPUT
          fi

      - name: Echo Command
        if: steps.check_command.outputs.triggered == 'true'
        run: |
          echo "User command was:"
          echo "${{ steps.check_command.outputs.command }}"
          
      - name: Add Response Comment
        if: steps.check_command.outputs.triggered == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `I received your command: ${process.env.COMMAND}`
            });
        env:
          COMMAND: ${{ steps.check_command.outputs.command }}